# 52×52 International Network Configuration
# =========================================
# Full dataset with Rest of World (RoW) node

data:
  source: "cfs"
  source_file: "data/cfs_2017_puf.csv"
  faf_path: "data/FAF5.7.1_State.csv"
  sample_size: null  # Full dataset
  year: 2017

network:
  interstate_only: true
  include_international: true  # Enable 52x52 with RoW
  weight_column: "weighted_value"

centrality:
  measures: ["betweenness","eigenvector","out_degree"]

validation:
  check_components: true
  check_strongly_connected: true
  verify_normalization: true

output:
  results_dir: "results"
  formats: ["csv","json","xlsx"]
  verbose: true

visualizations:
  generate: true
  formats: ["png","html"]
  include_structure_analysis: true
  include_sectoral_analysis: true

analysis:
  comparative:
    enabled: true
    use_cached_counterpart: true
    top_k: [5, 10, 20]
    measures: ["betweenness","eigenvector","out_degree"]