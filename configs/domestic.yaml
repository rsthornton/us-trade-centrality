# Pipeline Configuration (Authoritative Schema)
# ==============================================
# Central configuration for unified pipeline orchestration
# Aligns with pipeline_consolidation_plan.md schema
# CLI flags can override these values at runtime

data:
  source: "cfs"                       # "cfs" or "faf"
  source_file: "data/cfs_2017_puf.csv"
  faf_path: "data/FAF5.7.1_State.csv"
  sample_size: null                   # integer for sampling; null = full
  year: 2017

filters:                              # Optional (applies to FAF5)
  modes: [1,2,3,4,5]
  sctg2: ["15","16","17"]             # Ignored when source=cfs; only used for FAF runs

network:
  interstate_only: true               # drop intrastate flows
  include_international: false        # true → 52×52 with RoW=52
  weight_column: "weighted_value"     # for CFS after preprocessing
  filtration:
    enabled: false                    # Apply edge-weight filtration
    percentile: 30                    # Remove edges below this percentile
    verify_connectivity: true         # Fail if SCC breaks

centrality:
  measures: ["betweenness","eigenvector","out_degree"]

validation:
  check_components: true
  check_strongly_connected: true
  verify_normalization: true

output:
  results_dir: "results"
  formats: ["csv","json","xlsx"]
  verbose: true

visualizations:
  generate: true                          # Generate publication-ready figures
  formats: ["png","html"]                 # Figure formats to save
  commodity_name: ""                      # Optional commodity name for titles
  include_structure_analysis: true        # Include Advisor's network structure analyses
  include_sectoral_analysis: true         # Include network power advantage analysis
  run_full_sectoral_analysis: false       # Run comprehensive all-sector analysis (slow)

analysis:
  comparative:
    enabled: true
    use_cached_counterpart: true           # prefer loading the latest opposite run
    top_k: [5, 10, 20]
    measures: ["betweenness","eigenvector","out_degree"]